<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Fish feed - catfish in a pond">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="fSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a5a8a"/>
      <stop offset="45%"  stop-color="#2e88c0"/>
      <stop offset="100%" stop-color="#5ab4e0"/>
    </linearGradient>
    <!-- Deep water gradient -->
    <linearGradient id="fWater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3a8ab0" stop-opacity="0.95"/>
      <stop offset="30%"  stop-color="#2068a0"/>
      <stop offset="65%"  stop-color="#144e80"/>
      <stop offset="100%" stop-color="#0a2e58"/>
    </linearGradient>
    <!-- Water surface shimmer -->
    <linearGradient id="fSurface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#78c8e8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3a8ab0" stop-opacity="0.0"/>
    </linearGradient>
    <!-- Shallow bank -->
    <linearGradient id="fBank" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#8ab840"/>
      <stop offset="100%" stop-color="#5a8a20"/>
    </linearGradient>
    <!-- Reed/cattail stalk -->
    <linearGradient id="fReed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#5a8a28"/>
      <stop offset="100%" stop-color="#3a6a18"/>
    </linearGradient>
    <!-- Catfish body gradient -->
    <linearGradient id="fishBody1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3a3a3a"/>
      <stop offset="50%"  stop-color="#505050"/>
      <stop offset="100%" stop-color="#282828"/>
    </linearGradient>
    <linearGradient id="fishBody2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4a4a4a"/>
      <stop offset="50%"  stop-color="#626262"/>
      <stop offset="100%" stop-color="#363636"/>
    </linearGradient>
    <linearGradient id="fishBody3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#2e4a6e"/>
      <stop offset="50%"  stop-color="#426280"/>
      <stop offset="100%" stop-color="#243858"/>
    </linearGradient>
    <!-- Underwater light ray -->
    <linearGradient id="lightRay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#a0d8f0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a0d8f0" stop-opacity="0"/>
    </linearGradient>
    <!-- Bubble gradient -->
    <radialGradient id="bubbleGrad" cx="35%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#a0d8f0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6ab8d8" stop-opacity="0.1"/>
    </radialGradient>
    <!-- Bottom overlay -->
    <linearGradient id="fOverlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(0,20,40,0.0)"/>
      <stop offset="100%" stop-color="rgba(0,20,40,0.5)"/>
    </linearGradient>
    <filter id="fishBlur">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
    <filter id="deepBlur">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="230" fill="url(#fSky)"/>

  <!-- Clouds -->
  <g opacity="0.78">
    <ellipse cx="120" cy="80"  rx="80" ry="28" fill="white"/>
    <ellipse cx="158" cy="64"  rx="58" ry="24" fill="white"/>
    <ellipse cx="84"  cy="72"  rx="52" ry="22" fill="white"/>
  </g>
  <g opacity="0.65">
    <ellipse cx="600" cy="100" rx="70" ry="26" fill="white"/>
    <ellipse cx="638" cy="84"  rx="50" ry="22" fill="white"/>
    <ellipse cx="564" cy="92"  rx="48" ry="20" fill="white"/>
  </g>
  <g opacity="0.55">
    <ellipse cx="360" cy="55"  rx="55" ry="20" fill="white"/>
    <ellipse cx="392" cy="44"  rx="40" ry="18" fill="white"/>
  </g>

  <!-- Sun reflection on water -->
  <ellipse cx="400" cy="232" rx="200" ry="20" fill="#fff8a0" opacity="0.35"/>

  <!-- Green riverbank - left -->
  <path d="M0,160 Q40,140 80,155 Q120,140 160,155 L160,600 L0,600 Z"
        fill="url(#fBank)"/>
  <!-- Grass texture left bank -->
  <g stroke="#4a7a18" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
    <line x1="20"  y1="175" x2="15"  y2="155"/>
    <line x1="35"  y1="170" x2="38"  y2="150"/>
    <line x1="50"  y1="173" x2="46"  y2="153"/>
    <line x1="68"  y1="168" x2="65"  y2="148"/>
    <line x1="85"  y1="172" x2="88"  y2="152"/>
    <line x1="100" y1="169" x2="98"  y2="149"/>
    <line x1="118" y1="172" x2="120" y2="152"/>
    <line x1="135" y1="168" x2="133" y2="148"/>
    <line x1="150" y1="171" x2="152" y2="151"/>
  </g>

  <!-- Green riverbank - right -->
  <path d="M640,160 Q680,142 720,157 Q760,142 800,158 L800,600 L640,600 Z"
        fill="url(#fBank)"/>
  <!-- Grass texture right bank -->
  <g stroke="#4a7a18" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
    <line x1="655" y1="175" x2="652" y2="155"/>
    <line x1="672" y1="170" x2="675" y2="150"/>
    <line x1="690" y1="173" x2="688" y2="153"/>
    <line x1="708" y1="168" x2="710" y2="148"/>
    <line x1="725" y1="172" x2="728" y2="152"/>
    <line x1="742" y1="169" x2="740" y2="149"/>
    <line x1="760" y1="172" x2="762" y2="152"/>
    <line x1="778" y1="168" x2="776" y2="148"/>
  </g>

  <!-- WATER body -->
  <rect x="160" y="210" width="480" height="390" fill="url(#fWater)"/>

  <!-- Water surface layer (top of water) -->
  <rect x="160" y="210" width="480" height="40" fill="url(#fSurface)"/>

  <!-- Water surface ripple lines -->
  <g stroke="white" stroke-width="1.8" fill="none" opacity="0.35">
    <path d="M175,225 Q240,218 305,225 Q370,232 435,225 Q500,218 565,225 Q610,230 625,225"/>
    <path d="M175,238 Q255,231 335,238 Q415,245 495,238 Q555,233 625,238"/>
    <path d="M175,248 Q270,242 365,248 Q460,254 555,248 Q590,244 625,248"/>
  </g>

  <!-- ── Underwater light rays ── -->
  <g opacity="0.18">
    <path d="M260,210 L200,600 L285,600 Z" fill="url(#lightRay)"/>
    <path d="M380,210 L340,600 L425,600 Z" fill="url(#lightRay)"/>
    <path d="M500,210 L480,600 L560,600 Z" fill="url(#lightRay)"/>
  </g>

  <!-- ── Underwater plants / weeds ── -->
  <!-- Left weeds -->
  <g stroke="#2a6a30" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M195,600 Q188,560 200,520 Q210,488 198,460"/>
    <path d="M205,600 Q215,565 205,530 Q195,498 210,468"/>
    <path d="M218,600 Q225,558 215,518 Q205,482 220,445"/>
    <path d="M230,600 Q235,552 222,512 Q212,480 228,448"/>
  </g>
  <!-- Right weeds -->
  <g stroke="#2a6a30" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M590,600 Q584,558 595,518 Q605,486 594,458"/>
    <path d="M602,600 Q610,562 602,522 Q592,490 607,460"/>
    <path d="M615,600 Q620,555 610,515 Q600,480 615,445"/>
    <path d="M628,600 Q630,548 618,508 Q608,476 624,444"/>
  </g>

  <!-- Lily pad left -->
  <ellipse cx="200" cy="248" rx="28" ry="12" fill="#3a8a28" opacity="0.85" transform="rotate(-15,200,248)"/>
  <ellipse cx="190" cy="250" rx="22" ry="10" fill="#4a9a32" opacity="0.7" transform="rotate(-15,190,250)"/>
  <!-- Lily flower -->
  <g fill="#f0e040" transform="translate(202,242)">
    <ellipse cx="0" cy="-8" rx="4" ry="8" transform="rotate(0)"/>
    <ellipse cx="0" cy="-8" rx="4" ry="8" transform="rotate(60)"/>
    <ellipse cx="0" cy="-8" rx="4" ry="8" transform="rotate(120)"/>
    <ellipse cx="0" cy="-8" rx="4" ry="8" transform="rotate(180)"/>
    <ellipse cx="0" cy="-8" rx="4" ry="8" transform="rotate(240)"/>
    <ellipse cx="0" cy="-8" rx="4" ry="8" transform="rotate(300)"/>
    <circle cx="0" cy="0" r="5" fill="#f5b820"/>
  </g>
  <!-- Lily pad right -->
  <ellipse cx="598" cy="250" rx="26" ry="11" fill="#3a8a28" opacity="0.85" transform="rotate(12,598,250)"/>
  <ellipse cx="608" cy="252" rx="20" ry="9" fill="#4a9a32" opacity="0.7" transform="rotate(12,608,252)"/>

  <!-- ── CATFISH ── -->
  <!-- Catfish 1 (large, prominent) -->
  <g transform="translate(390,340)" filter="url(#fishBlur)">
    <!-- Body (elongated oval) -->
    <ellipse cx="0" cy="0" rx="80" ry="28" fill="url(#fishBody1)"/>
    <!-- Belly (lighter) -->
    <ellipse cx="10" cy="8" rx="55" ry="16" fill="#6a6a6a" opacity="0.5"/>
    <!-- Mottled spots -->
    <circle cx="-20" cy="-8"  r="8"  fill="#282828" opacity="0.5"/>
    <circle cx="5"   cy="-10" r="6"  fill="#282828" opacity="0.4"/>
    <circle cx="25"  cy="-5"  r="7"  fill="#282828" opacity="0.45"/>
    <circle cx="-40" cy="2"   r="5"  fill="#282828" opacity="0.35"/>
    <!-- Tail fin -->
    <path d="M76,0 Q90,-22 96,-28 Q90,-8 96,0 Q90,8 96,28 Q90,22 76,0 Z" fill="#3a3a3a"/>
    <!-- Dorsal fin -->
    <path d="M20,-26 Q30,-52 45,-48 Q38,-38 42,-26 Z" fill="#303030"/>
    <!-- Pectoral fin -->
    <path d="M15,20 Q8,40 -5,42 Q2,30 -2,20 Z" fill="#383838"/>
    <!-- Catfish head (broader at front) -->
    <ellipse cx="-62" cy="0" rx="26" ry="22" fill="url(#fishBody1)"/>
    <!-- Flat mouth -->
    <path d="M-84,5 Q-88,0 -84,-5" stroke="#222" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Eye -->
    <circle cx="-70" cy="-8" r="7" fill="#1a1a1a"/>
    <circle cx="-68" cy="-10" r="2.5" fill="white"/>
    <!-- Whiskers (barbels) - catfish characteristic -->
    <line x1="-84" y1="0"   x2="-110" y2="-15" stroke="#484848" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-84" y1="2"   x2="-112" y2="10"  stroke="#484848" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-82" y1="-5"  x2="-105" y2="-25" stroke="#484848" stroke-width="2"   stroke-linecap="round"/>
    <line x1="-82" y1="5"   x2="-106" y2="22"  stroke="#484848" stroke-width="2"   stroke-linecap="round"/>
    <!-- Spine on dorsal fin -->
    <line x1="25"  y1="-26" x2="25"   y2="-50" stroke="#282828" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Catfish 2 (medium, swimming up-right, slightly deeper) -->
  <g transform="translate(260,430) rotate(-18) scale(0.75)" filter="url(#fishBlur)">
    <ellipse cx="0" cy="0" rx="80" ry="28" fill="url(#fishBody2)"/>
    <ellipse cx="10" cy="8" rx="55" ry="16" fill="#7a7a7a" opacity="0.45"/>
    <circle cx="-15" cy="-8" r="7"  fill="#383838" opacity="0.5"/>
    <circle cx="10"  cy="-9" r="5"  fill="#383838" opacity="0.4"/>
    <circle cx="30"  cy="-5" r="6"  fill="#383838" opacity="0.4"/>
    <path d="M76,0 Q90,-22 96,-28 Q90,-8 96,0 Q90,8 96,28 Q90,22 76,0 Z" fill="#444444"/>
    <path d="M20,-26 Q30,-52 45,-48 Q38,-38 42,-26 Z" fill="#3a3a3a"/>
    <path d="M15,20 Q8,40 -5,42 Q2,30 -2,20 Z" fill="#404040"/>
    <ellipse cx="-62" cy="0" rx="26" ry="22" fill="url(#fishBody2)"/>
    <path d="M-84,5 Q-88,0 -84,-5" stroke="#222" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="-70" cy="-8" r="7" fill="#1a1a1a"/>
    <circle cx="-68" cy="-10" r="2.5" fill="white"/>
    <line x1="-84" y1="0"  x2="-108" y2="-14" stroke="#505050" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-84" y1="2"  x2="-110" y2="9"   stroke="#505050" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-82" y1="-4" x2="-102" y2="-22" stroke="#505050" stroke-width="2"   stroke-linecap="round"/>
    <line x1="-82" y1="5"  x2="-104" y2="20"  stroke="#505050" stroke-width="2"   stroke-linecap="round"/>
    <line x1="25"  y1="-26" x2="25"  y2="-50" stroke="#303030" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Catfish 3 (smaller, near surface, right side) -->
  <g transform="translate(530,290) rotate(8) scale(0.6)" filter="url(#fishBlur)">
    <ellipse cx="0" cy="0" rx="80" ry="28" fill="url(#fishBody3)"/>
    <ellipse cx="10" cy="8" rx="55" ry="16" fill="#6a8aa0" opacity="0.5"/>
    <circle cx="-20" cy="-8" r="7" fill="#203858" opacity="0.5"/>
    <circle cx="5"   cy="-9" r="5" fill="#203858" opacity="0.4"/>
    <circle cx="30"  cy="-5" r="6" fill="#203858" opacity="0.4"/>
    <path d="M76,0 Q90,-22 96,-28 Q90,-8 96,0 Q90,8 96,28 Q90,22 76,0 Z" fill="#2e4a6e"/>
    <path d="M20,-26 Q30,-52 45,-48 Q38,-38 42,-26 Z" fill="#2a4468"/>
    <path d="M15,20 Q8,40 -5,42 Q2,30 -2,20 Z" fill="#324e72"/>
    <ellipse cx="-62" cy="0" rx="26" ry="22" fill="url(#fishBody3)"/>
    <path d="M-84,5 Q-88,0 -84,-5" stroke="#1a2838" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="-70" cy="-8" r="7" fill="#0a1828"/>
    <circle cx="-68" cy="-10" r="2.5" fill="white"/>
    <line x1="-84" y1="0"  x2="-106" y2="-13" stroke="#4a6080" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-84" y1="2"  x2="-108" y2="9"   stroke="#4a6080" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-82" y1="-4" x2="-100" y2="-20" stroke="#4a6080" stroke-width="2"   stroke-linecap="round"/>
    <line x1="-82" y1="5"  x2="-102" y2="19"  stroke="#4a6080" stroke-width="2"   stroke-linecap="round"/>
    <line x1="25"  y1="-26" x2="25"  y2="-50" stroke="#243050" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Catfish 4 (deep, faded) -->
  <g transform="translate(335,520) rotate(-5) scale(0.55)" filter="url(#deepBlur)" opacity="0.55">
    <ellipse cx="0" cy="0" rx="80" ry="28" fill="#2a3a50"/>
    <path d="M76,0 Q90,-22 96,-28 Q90,-8 96,0 Q90,8 96,28 Q90,22 76,0 Z" fill="#1e2e40"/>
    <ellipse cx="-62" cy="0" rx="26" ry="22" fill="#2a3a50"/>
    <circle cx="-70" cy="-8" r="7" fill="#0a0a1a"/>
    <line x1="-84" y1="0"  x2="-108" y2="-14" stroke="#383858" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-84" y1="2"  x2="-110" y2="9"   stroke="#383858" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-82" y1="-4" x2="-102" y2="-22" stroke="#383858" stroke-width="2"   stroke-linecap="round"/>
  </g>

  <!-- ── Bubbles ── -->
  <!-- Rising from fish / ground -->
  <g fill="url(#bubbleGrad)" stroke="rgba(160,216,240,0.5)" stroke-width="1.2">
    <circle cx="310" cy="500" r="5"/>
    <circle cx="305" cy="475" r="4"/>
    <circle cx="314" cy="450" r="3.5"/>
    <circle cx="308" cy="428" r="3"/>
    <circle cx="315" cy="405" r="2.5"/>
    <circle cx="411" cy="420" r="5.5"/>
    <circle cx="408" cy="396" r="4.5"/>
    <circle cx="416" cy="374" r="3.5"/>
    <circle cx="409" cy="352" r="3"/>
    <circle cx="395" cy="540" r="4"/>
    <circle cx="390" cy="516" r="3.5"/>
    <circle cx="398" cy="492" r="3"/>
    <circle cx="470" cy="480" r="5"/>
    <circle cx="466" cy="458" r="4"/>
    <circle cx="475" cy="435" r="3"/>
    <circle cx="469" cy="412" r="2.5"/>
    <circle cx="540" cy="390" r="4.5"/>
    <circle cx="536" cy="368" r="3.5"/>
    <circle cx="544" cy="346" r="3"/>
    <circle cx="537" cy="325" r="2.5"/>
  </g>

  <!-- ── Cattail reeds (left bank) ── -->
  <g stroke="url(#fReed)" stroke-width="3.5" stroke-linecap="round">
    <line x1="172" y1="440" x2="170" y2="270"/>
    <line x1="182" y1="450" x2="184" y2="285"/>
    <line x1="193" y1="435" x2="191" y2="272"/>
    <line x1="145" y1="430" x2="143" y2="268"/>
    <line x1="155" y1="445" x2="157" y2="282"/>
  </g>
  <!-- Cattail heads (brown oval tops) -->
  <g fill="#8b5e20">
    <ellipse cx="170" cy="268" rx="6"  ry="16" transform="rotate(-5,170,268)"/>
    <ellipse cx="184" cy="283" rx="6"  ry="16" transform="rotate(3,184,283)"/>
    <ellipse cx="191" cy="270" rx="6"  ry="16" transform="rotate(-2,191,270)"/>
    <ellipse cx="143" cy="266" rx="5"  ry="14" transform="rotate(-4,143,266)"/>
    <ellipse cx="157" cy="280" rx="5"  ry="14" transform="rotate(2,157,280)"/>
  </g>
  <!-- Leaf blades on reeds -->
  <g fill="#4a8028" opacity="0.7">
    <path d="M170,310 Q152,295 148,280 Q162,292 168,308 Z"/>
    <path d="M184,320 Q200,304 202,290 Q190,306 182,318 Z"/>
    <path d="M191,305 Q176,292 174,278 Q186,290 189,303 Z"/>
  </g>

  <!-- Cattail reeds (right bank) -->
  <g stroke="url(#fReed)" stroke-width="3.5" stroke-linecap="round">
    <line x1="626" y1="440" x2="628" y2="270"/>
    <line x1="614" y1="450" x2="612" y2="285"/>
    <line x1="605" y1="435" x2="607" y2="272"/>
    <line x1="650" y1="430" x2="652" y2="265"/>
    <line x1="638" y1="445" x2="640" y2="280"/>
  </g>
  <g fill="#8b5e20">
    <ellipse cx="628" cy="268" rx="6"  ry="16" transform="rotate(4,628,268)"/>
    <ellipse cx="612" cy="283" rx="6"  ry="16" transform="rotate(-3,612,283)"/>
    <ellipse cx="607" cy="270" rx="6"  ry="16" transform="rotate(2,607,270)"/>
    <ellipse cx="652" cy="263" rx="5"  ry="14" transform="rotate(5,652,263)"/>
    <ellipse cx="640" cy="278" rx="5"  ry="14" transform="rotate(-2,640,278)"/>
  </g>
  <g fill="#4a8028" opacity="0.7">
    <path d="M628,308 Q644,293 648,278 Q634,292 630,306 Z"/>
    <path d="M612,318 Q596,302 594,288 Q608,304 614,316 Z"/>
    <path d="M607,302 Q620,290 622,276 Q610,288 608,300 Z"/>
  </g>

  <!-- Feed pellets falling from top (from feeding) -->
  <g fill="#d4a830" opacity="0.85">
    <ellipse cx="310" cy="225" rx="5" ry="5"/>
    <ellipse cx="325" cy="232" rx="4" ry="4"/>
    <ellipse cx="318" cy="242" rx="4.5" ry="4.5"/>
    <ellipse cx="338" cy="226" rx="4" ry="4"/>
    <ellipse cx="350" cy="235" rx="5" ry="5"/>
    <ellipse cx="365" cy="228" rx="4" ry="4"/>
    <ellipse cx="360" cy="242" rx="4.5" ry="4.5"/>
    <ellipse cx="380" cy="230" rx="5" ry="5"/>
    <ellipse cx="375" cy="245" rx="4" ry="4"/>
    <ellipse cx="395" cy="226" rx="4.5" ry="4.5"/>
  </g>
  <!-- Feed pellets sinking (deeper in water) -->
  <g fill="#c09820" opacity="0.55">
    <ellipse cx="322" cy="280" rx="4" ry="4"/>
    <ellipse cx="340" cy="298" rx="3.5" ry="3.5"/>
    <ellipse cx="360" cy="275" rx="4" ry="4"/>
    <ellipse cx="378" cy="290" rx="3.5" ry="3.5"/>
    <ellipse cx="398" cy="280" rx="4" ry="4"/>
  </g>

  <!-- Bottom overlay -->
  <rect width="800" height="600" fill="url(#fOverlay)"/>
</svg>
